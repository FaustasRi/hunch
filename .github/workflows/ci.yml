name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # fail fast instead of hanging up to GitHub's 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node 20 hung vitest teardown after the suite passed (and is GH-deprecated)
          cache: npm
      - run: npm ci
      # Split out of `npm run verify` so the CI log pinpoints exactly which stage stalls.
      - run: npm run typecheck
      - run: npm run lint
      # vitest streams a per-file result line (default reporter) during the run but
      # never exits on this Linux runner (teardown hang, before the final summary /
      # any reporter onFinished; tap/json/custom reporters emit nothing here). Capture
      # the streamed output, kill the zombie via timeout, then judge from it.
      # Honest: any failure marker -> fail; incomplete run -> fail (scripts/check-tests.mjs).
      - name: test
        run: |
          # vitest streams per-file lines to a PIPE (not a file redirect) on this
          # runner, then hangs on teardown. `tee` keeps stdout a pipe so the lines
          # stream, and mirrors them to test.out. `set +e +o pipefail` stops the
          # timeout-kill (exit 124) from aborting before the parser runs.
          set +e +o pipefail
          timeout 120 npx vitest run 2>&1 | tee test.out
          node scripts/check-tests.mjs test.out
      - run: npm run build
