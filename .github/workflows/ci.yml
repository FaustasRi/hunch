name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # fail fast instead of hanging up to GitHub's 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node 20 hung vitest teardown after the suite passed (and is GH-deprecated)
          cache: npm
      - run: npm ci
      # Split out of `npm run verify` so the CI log pinpoints exactly which stage stalls.
      - run: npm run typecheck
      - run: npm run lint
      # vitest streams per-file TAP results during the run but never exits on this
      # Linux runner (teardown hang, before any reporter onFinished fires). Capture
      # the streamed TAP, kill the zombie via timeout, then judge pass/fail from it.
      # Honest: any `not ok` -> fail; an incomplete run -> fail (see scripts/check-tap.mjs).
      - name: test
        run: |
          set +e
          timeout 120 npx vitest run --reporter=tap > tap.out 2>&1
          set -e
          node scripts/check-tap.mjs tap.out
      - run: npm run build
