name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # fail fast instead of hanging up to GitHub's 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node 20 hung vitest teardown after the suite passed (and is GH-deprecated)
          cache: npm
      - run: npm ci
      # Split out of `npm run verify` so the CI log pinpoints exactly which stage stalls.
      - run: npm run typecheck
      - run: npm run lint
      # vitest passes the whole suite but does not exit in this Linux CI env
      # (worker/esbuild teardown hangs; it exits fine locally). Gate on its JSON
      # result and don't wait for the hang. Honest: a real failure -> success:false -> exit 1.
      - name: test
        run: |
          set -uo pipefail
          npx vitest run --reporter=default --reporter=json --outputFile=vitest-results.json &
          VPID=$!
          for _ in $(seq 1 150); do [ -s vitest-results.json ] && break; sleep 2; done
          if [ ! -s vitest-results.json ]; then echo "::error::vitest produced no results"; kill "$VPID" 2>/dev/null || true; exit 1; fi
          sleep 2; kill "$VPID" 2>/dev/null || true
          node -e "const r=require('./vitest-results.json'); if(!r.success){process.exit(1)}; console.log('vitest passed', r.numTotalTests, 'tests')"
      - run: npm run build
