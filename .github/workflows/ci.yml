name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # fail fast instead of hanging up to GitHub's 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node 20 hung vitest teardown after the suite passed (and is GH-deprecated)
          cache: npm
      - run: npm ci
      # Split out of `npm run verify` so the CI log pinpoints exactly which stage stalls.
      - run: npm run typecheck
      - run: npm run lint
      # vitest completes the suite but never exits on this Linux runner (worker/
      # esbuild teardown hang; it exits fine locally). test:ci runs vitest
      # in-process and force-exits with the verdict. Honest: any failed test -> exit 1.
      - run: npm run test:ci
      - run: npm run build
